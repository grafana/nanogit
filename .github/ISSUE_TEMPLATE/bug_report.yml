name: Bug report
description: Report a problem with nanogit
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A minimal code sample or CLI command that reproduces the problem.
      render: go
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: nanogit-version
    attributes:
      label: nanogit version
      placeholder: "v1.4.0 (go list -m github.com/grafana/nanogit)"
    validations:
      required: true
  - type: input
    id: git-provider
    attributes:
      label: Git provider
      description: Which Git server or hosting service were you talking to, including version if self-hosted?
      placeholder: "GitHub / GitLab self-hosted 16.x / Gitea 1.21 …"
  - type: input
    id: environment
    attributes:
      label: Go version and OS
      placeholder: "go1.26.5 darwin/arm64"
  - type: textarea
    id: additional-context
    attributes:
      label: Anything else?
      description: Logs (for wire-level detail, run with `NANOGIT_TRACE=1`), stack traces, or any other context.
