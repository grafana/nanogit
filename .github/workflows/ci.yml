name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generated Files
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: apk add --no-cache git make
      - name: Generate files
        env:
          COUNTERFEITER_NO_GENERATE_WARNING: true
        run: make generate
      - name: Verify generated files are up to date
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated files are out of date. Run 'make generate' to update them."
            git diff
            exit 1
          fi

  format:
    name: Format
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: apk add --no-cache git make
      - name: Check formatting
        run: make fmt
      - name: Verify formatting
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Code formatting issues found. Run 'make fmt' to fix them."
            git diff
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: apk add --no-cache git make
      - name: Run linter
        run: make lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: |
          apk add --no-cache git make gcc musl-dev bash curl gpg gpg-agent gpgsm openssh-keygen
      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Sync vendor directory
        run: go work vendor
      - name: Run unit tests
        env:
          CGO_ENABLED: 1
        run: make test-unit

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    # These permissions are needed to assume roles from Github's OIDC.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: |
          apk add --no-cache git make gcc musl-dev bash curl gpg gpg-agent gpgsm openssh-keygen
      - id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@a53fc80bc30b0a16a262520465db899fa3af08b7 # get-vault-secrets/v1.3.2
        with:
          # Secrets placed in the ci/repo/grafana/<repo>/<path> path in Vault
          repo_secrets: |
            CODECOV_TOKEN=codecov:CODECOV_TOKEN
      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Sync vendor directory
        run: go work vendor
      - name: Run tests with coverage
        env:
          CGO_ENABLED: 1
        run: make test-coverage
      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: true
          files: ./coverage.txt
          token: ${{ env.CODECOV_TOKEN }}

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: |
          apk add --no-cache git make gcc musl-dev bash curl gpg
      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Sync vendor directory
        run: go work vendor
      - name: Run integration tests
        env:
          CGO_ENABLED: 1
        run: make test-integration

  test-github-provider:
    name: GitHub Provider Tests
    if: github.repository == 'grafana/nanogit'
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    # These permissions are needed to assume roles from Github's OIDC.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: |
          apk add --no-cache git make gcc musl-dev bash curl gpg
      - id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@a53fc80bc30b0a16a262520465db899fa3af08b7 # get-vault-secrets/v1.3.2
        with:
          # Secrets placed in the ci/repo/grafana/<repo>/<path> path in Vault
          repo_secrets: |
            REPO_USER=github:REPO_USER
            REPO_TOKEN=github:REPO_TOKEN
            SIGN_EMAIL=signing:EMAIL
            SIGN_GPG_KEY=signing:GPG_KEY
            SIGN_SSH_KEY=signing:SSH_KEY
            SIGN_SMIME_KEY=signing:SMIME_KEY
            SIGN_SMIME_CERT=signing:SMIME_CERT
      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Sync vendor directory
        run: go work vendor
      - name: Run provider tests
        env:
          CGO_ENABLED: 1
          TEST_PROVIDER: github
          TEST_REPO: ${{ vars.GH_REPO_NAME }}
          TEST_USER: ${{ env.REPO_USER }}
          TEST_TOKEN: ${{ env.REPO_TOKEN }}
          TEST_SIGN_EMAIL: ${{ env.SIGN_EMAIL }}
          TEST_GPG_KEY: ${{ env.SIGN_GPG_KEY }}
          TEST_SSH_KEY: ${{ env.SIGN_SSH_KEY }}
          TEST_SMIME_KEY: ${{ env.SIGN_SMIME_KEY }}
          TEST_SMIME_CERT: ${{ env.SIGN_SMIME_CERT }}
        run: |
          if [ -z "$TEST_REPO" ] || [ -z "$TEST_TOKEN" ] || [ -z "$TEST_USER" ]; then
            echo "Skipping provider tests: TEST_REPO or TEST_TOKEN or TEST_USER not set"
            exit 0
          fi
          make test-providers

  test-gitlab-provider:
    name: GitLab Provider Tests
    if: github.repository == 'grafana/nanogit'
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    # These permissions are needed to assume roles from Github's OIDC.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: |
          apk add --no-cache git make gcc musl-dev bash curl gpg
      - id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@a53fc80bc30b0a16a262520465db899fa3af08b7 # get-vault-secrets/v1.3.2
        with:
          # Secrets placed in the ci/repo/grafana/<repo>/<path> path in Vault
          repo_secrets: |
            REPO_USER=gitlab:REPO_USER
            REPO_TOKEN=gitlab:REPO_TOKEN
            SIGN_EMAIL=signing:EMAIL
            SIGN_GPG_KEY=signing:GPG_KEY
            SIGN_SSH_KEY=signing:SSH_KEY
            SIGN_SMIME_KEY=signing:SMIME_KEY
            SIGN_SMIME_CERT=signing:SMIME_CERT
      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Sync vendor directory
        run: go work vendor
      - name: Run provider tests
        env:
          CGO_ENABLED: 1
          TEST_PROVIDER: gitlab
          TEST_REPO: ${{ vars.GITLAB_REPO_NAME }}
          TEST_USER: ${{ env.REPO_USER }}
          TEST_TOKEN: ${{ env.REPO_TOKEN }}
          TEST_SIGN_EMAIL: ${{ env.SIGN_EMAIL }}
          TEST_GPG_KEY: ${{ env.SIGN_GPG_KEY }}
          TEST_SSH_KEY: ${{ env.SIGN_SSH_KEY }}
          TEST_SMIME_KEY: ${{ env.SIGN_SMIME_KEY }}
          TEST_SMIME_CERT: ${{ env.SIGN_SMIME_CERT }}
        run: |
          if [ -z "$TEST_REPO" ] || [ -z "$TEST_TOKEN" ] || [ -z "$TEST_USER" ]; then
            echo "Skipping provider tests: TEST_REPO or TEST_TOKEN or TEST_USER not set"
            exit 0
          fi
          make test-providers
  test-bitbucket-provider:
    name: Bitbucket Provider Tests
    if: github.repository == 'grafana/nanogit'
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    # These permissions are needed to assume roles from Github's OIDC.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: |
          apk add --no-cache git make gcc musl-dev bash curl gpg
      - id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@a53fc80bc30b0a16a262520465db899fa3af08b7 # get-vault-secrets/v1.3.2
        with:
          # Secrets placed in the ci/repo/grafana/<repo>/<path> path in Vault
          repo_secrets: |
            REPO_USER=bitbucket:REPO_USER
            REPO_TOKEN=bitbucket:REPO_TOKEN
            SIGN_EMAIL=signing:EMAIL
            SIGN_GPG_KEY=signing:GPG_KEY
            SIGN_SSH_KEY=signing:SSH_KEY
            SIGN_SMIME_KEY=signing:SMIME_KEY
            SIGN_SMIME_CERT=signing:SMIME_CERT
      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Sync vendor directory
        run: go work vendor
      - name: Run provider tests
        env:
          CGO_ENABLED: 1
          TEST_PROVIDER: bitbucket
          TEST_REPO: ${{ vars.BITBUCKET_REPO_NAME }}
          TEST_USER: ${{ env.REPO_USER }}
          TEST_TOKEN: ${{ env.REPO_TOKEN }}
          TEST_SIGN_EMAIL: ${{ env.SIGN_EMAIL }}
          TEST_GPG_KEY: ${{ env.SIGN_GPG_KEY }}
          TEST_SSH_KEY: ${{ env.SIGN_SSH_KEY }}
          TEST_SMIME_KEY: ${{ env.SIGN_SMIME_KEY }}
          TEST_SMIME_CERT: ${{ env.SIGN_SMIME_CERT }}
        run: |
          if [ -z "$TEST_REPO" ] || [ -z "$TEST_TOKEN" ] || [ -z "$TEST_USER" ]; then
            echo "Skipping provider tests: TEST_REPO or TEST_TOKEN or TEST_USER not set"
            exit 0
          fi
          make test-providers

  security:
    name: Security
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: apk add --no-cache git make
      - name: Check for vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  trufflehog:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # Required for scanning git history
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@afd5336caad0f61da51750ffe39869974b27b0db
        with:
          extra_args: --results=verified,unknown --exclude-globs='protocol/signing/testsigning/**'

  deps:
    name: Dependencies
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: apk add --no-cache git make
      - name: Check for go.mod and go.sum consistency
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::go.mod and go.sum are out of sync. Run 'go mod tidy' to fix them."
            git diff
            exit 1
          fi
      - name: Check for unused dependencies
        run: |
          go install github.com/remyoudompheng/go-misc/deadcode@latest
          deadcode ./... || true

  staticcheck:
    name: Static Analysis
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: apk add --no-cache git make
      - name: Check for staticcheck issues
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  test-clone-perf:
    name: Clone Performance Tests
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: |
          apk add --no-cache git make gcc musl-dev bash curl
      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-perf-${{ hashFiles('perf/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-perf-
      - name: Run clone performance tests
        env:
          CGO_ENABLED: 1
        run: |
          cd perf
          make test-clone-perf

  test-clone-perf-full:
    name: Full Clone Performance Test (1 minute limit)
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: |
          apk add --no-cache git make gcc musl-dev bash curl
      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-perf-${{ hashFiles('perf/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-perf-
      - name: Run full clone performance test with 1 minute timeout
        env:
          CGO_ENABLED: 1
          RUN_CLONE_PERF_TESTS: true
          RUN_FULL_CLONE_TEST: true
        run: |
          cd perf
          echo "Running full repository clone test with 1 minute timeout..."
          echo "Test will FAIL if clone takes more than 60 seconds"
          go test -v -timeout 1m -run TestCloneGrafanaGrafanaFullRepository .

  cli-build:
    name: CLI Build
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: apk add --no-cache git make
      - name: Sync vendor directory
        run: go work vendor
      - name: Build CLI binary
        run: make cli-build
      - name: Verify binary exists and runs
        run: |
          test -f bin/nanogit || (echo "Binary not found" && exit 1)
          ./bin/nanogit --version

  cli-format:
    name: CLI Format
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: apk add --no-cache git make
      - name: Check CLI formatting
        run: make cli-fmt
      - name: Verify formatting
        run: |
          if [ -n "$(git status --porcelain cli/)" ]; then
            echo "::error::CLI code formatting issues found. Run 'make cli-fmt' to fix them."
            git diff cli/
            exit 1
          fi

  cli-lint:
    name: CLI Lint
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4-alpine@sha256:7a3e50096189ad57c9f9f865e7e4aa8585ed1585248513dc5cda498e2f41812c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build dependencies
        run: apk add --no-cache git make
      - name: Run CLI linter
        run: make cli-lint
