name: Release

on:
  push:
    branches:
      - main

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Restrict workflow-level permissions to read-only by default
permissions:
  contents: read

jobs:
  # Wait for CI to complete before releasing
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Wait for CI checks
        uses: lewagon/wait-on-check-action@74049309dfeff245fe8009a0137eacf28136cb3c # v1.5.0
        with:
          ref: ${{ github.sha }}
          check-regexp: '.*'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success,skipped
          # Exclude this workflow from the checks
          running-workflow-name: 'Wait for CI'

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: wait-for-ci
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 'lts/*'
          # Disable caching to prevent cache poisoning attacks
          package-manager-cache: false

      - name: Install semantic-release
        run: |
          npm install -g \
            semantic-release@23 \
            @semantic-release/changelog@6 \
            @semantic-release/github@10 \
            @semantic-release/commit-analyzer@12 \
            @semantic-release/release-notes-generator@13 \
            conventional-changelog-conventionalcommits@7

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verify release configuration
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "Checking for .releaserc.json..."
          cat .releaserc.json
          echo "Repository: ${REPO}"
          echo "Branch: ${BRANCH}"

      - name: Get last release
        id: last_release
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "Last release tag: $LAST_TAG"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: npx semantic-release

      - name: Get new release
        id: new_release
        run: |
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New release tag: $NEW_TAG"

      - name: Prepare CHANGELOG branch
        id: changelog_branch
        if: steps.new_release.outputs.new_tag != 'none' && steps.new_release.outputs.new_tag != steps.last_release.outputs.last_tag
        env:
          NEW_VERSION: ${{ steps.new_release.outputs.new_tag }}
        run: |
          # Check if CHANGELOG.md was modified
          if git diff --quiet CHANGELOG.md; then
            echo "CHANGELOG.md not modified, skipping branch creation"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT

          # Create and checkout branch for CHANGELOG
          BRANCH_NAME="chore/changelog-${NEW_VERSION}"
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

          git checkout -b "${BRANCH_NAME}"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG for ${NEW_VERSION}"
          git push origin "${BRANCH_NAME}"

          # Return to main and reset CHANGELOG to clean state for GoReleaser
          git checkout main
          git checkout HEAD -- CHANGELOG.md
          echo "✅ CHANGELOG saved to branch ${BRANCH_NAME}, main is now clean for GoReleaser"

      - name: Setup Go
        if: steps.new_release.outputs.new_tag != 'none' && steps.new_release.outputs.new_tag != steps.last_release.outputs.last_tag
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25.8'
          # Disable cache to prevent cache poisoning attacks
          cache: false

      - name: Build CLI binaries with GoReleaser
        if: steps.new_release.outputs.new_tag != 'none' && steps.new_release.outputs.new_tag != steps.last_release.outputs.last_tag
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          distribution: goreleaser
          # Pin to specific version to prevent runtime artifact poisoning
          version: 'v2.6.1'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create module tags
        if: steps.new_release.outputs.new_tag != 'none' && steps.new_release.outputs.new_tag != steps.last_release.outputs.last_tag
        env:
          NEW_VERSION: ${{ steps.new_release.outputs.new_tag }}
        run: |
          # Extract version without 'v' prefix
          VERSION="${NEW_VERSION#v}"

          # Get the commit SHA for the new release tag (resolve to commit, not tag object)
          COMMIT_SHA=$(git rev-list -n 1 "${NEW_VERSION}")

          echo "Creating module tags for version ${VERSION} at commit ${COMMIT_SHA}"

          # Create gittest module tag (public utility for users)
          TAG_NAME="gittest/v${VERSION}"

          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            # Tag already exists; check whether it points to the expected commit
            EXISTING_SHA=$(git rev-parse "${TAG_NAME}")
            if [ "${EXISTING_SHA}" = "${COMMIT_SHA}" ]; then
              echo "✅ Tag ${TAG_NAME} already exists at ${COMMIT_SHA}; skipping creation."
            else
              echo "Error: Tag ${TAG_NAME} already exists at ${EXISTING_SHA}, expected ${COMMIT_SHA}." >&2
              exit 1
            fi
          else
            git tag "${TAG_NAME}" "${COMMIT_SHA}"
            git push origin "${TAG_NAME}"
            echo "✅ Created ${TAG_NAME}"
          fi

          # Note: tests module is internal only (not tagged)

          echo "Module tags created successfully"

      - name: Create CHANGELOG PR
        if: steps.new_release.outputs.new_tag != 'none' && steps.new_release.outputs.new_tag != steps.last_release.outputs.last_tag && steps.changelog_branch.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.new_release.outputs.new_tag }}
          BRANCH_NAME: ${{ steps.changelog_branch.outputs.branch_name }}
          REPO: ${{ github.repository }}
        run: |
          # Create PR with auto-merge
          PR_BODY="Automated CHANGELOG update for release ${NEW_VERSION}.

          This PR was automatically generated by the release workflow.

          **Release:** [${NEW_VERSION}](https://github.com/${REPO}/releases/tag/${NEW_VERSION})

          🤖 Auto-merge enabled - will merge automatically once CI passes."

          PR_URL=$(gh pr create \
            --title "chore: update CHANGELOG for ${NEW_VERSION}" \
            --body "${PR_BODY}" \
            --base main \
            --head "${BRANCH_NAME}")

          echo "✅ Created PR: ${PR_URL}"

          # Enable auto-merge on the PR
          gh pr merge "${PR_URL}" --auto --squash
          echo "✅ Auto-merge enabled"

      - name: Notify pkg.go.dev
        if: steps.new_release.outputs.new_tag != 'none' && steps.new_release.outputs.new_tag != steps.last_release.outputs.last_tag
        run: |
          echo "New version released: ${{ steps.new_release.outputs.new_tag }}"
          echo "pkg.go.dev will automatically index this release within a few minutes"
          echo "View at: https://pkg.go.dev/github.com/grafana/nanogit@${{ steps.new_release.outputs.new_tag }}"

      - name: Summary
        if: steps.new_release.outputs.new_tag != 'none' && steps.new_release.outputs.new_tag != steps.last_release.outputs.last_tag
        env:
          NEW_VERSION: ${{ steps.new_release.outputs.new_tag }}
        run: |
          VERSION="${NEW_VERSION#v}"

          echo "## 🚀 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**New Version:** \`${{ steps.new_release.outputs.new_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Previous Version:** \`${{ steps.last_release.outputs.last_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Module Tags Created" >> $GITHUB_STEP_SUMMARY
          echo "- \`v${VERSION}\` - Main nanogit module" >> $GITHUB_STEP_SUMMARY
          echo "- \`gittest/v${VERSION}\` - Test utilities module (public)" >> $GITHUB_STEP_SUMMARY
          echo "- \`tests/\` - Internal tests only (no tag needed)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 CLI Binaries" >> $GITHUB_STEP_SUMMARY
          echo "Pre-built binaries for Linux, macOS, and Windows have been uploaded to the release." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📚 Package Links" >> $GITHUB_STEP_SUMMARY
          echo "**nanogit (main):**" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.new_release.outputs.new_tag }})" >> $GITHUB_STEP_SUMMARY
          echo "- [pkg.go.dev](https://pkg.go.dev/github.com/grafana/nanogit@${{ steps.new_release.outputs.new_tag }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**gittest (public utility):**" >> $GITHUB_STEP_SUMMARY
          echo "- [pkg.go.dev](https://pkg.go.dev/github.com/grafana/nanogit/gittest@gittest/v${VERSION})" >> $GITHUB_STEP_SUMMARY

      - name: No release needed
        if: steps.new_release.outputs.new_tag == steps.last_release.outputs.last_tag
        run: |
          echo "## ℹ️ No Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No new release was created. This can happen when:" >> $GITHUB_STEP_SUMMARY
          echo "- Commits don't follow conventional commit format" >> $GITHUB_STEP_SUMMARY
          echo "- Only non-release commits (docs, chore, ci, etc.)" >> $GITHUB_STEP_SUMMARY
          echo "- Commit message contains \`[skip ci]\` or \`[skip release]\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit message format:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`fix: ...\` → Patch release (v0.1.0 → v0.1.1)" >> $GITHUB_STEP_SUMMARY
          echo "- \`feat: ...\` → Minor release (v0.1.0 → v0.2.0)" >> $GITHUB_STEP_SUMMARY
          echo "- \`feat!: ...\` or \`BREAKING CHANGE:\` → Major release (v0.1.0 → v1.0.0)" >> $GITHUB_STEP_SUMMARY
