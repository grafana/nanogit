name: Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs.yml'
      - '*.md'
      - 'scripts/prepare-docs.sh'
  pull_request:
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs.yml'
      - '*.md'
      - 'scripts/prepare-docs.sh'
  # The release workflow dispatches this (workflow_dispatch) after publishing a
  # release, so the changelog page (generated from GitHub Releases) refreshes.
  # We deliberately do NOT use a `release:` trigger here: it would classify this
  # workflow as a publishing workflow and flag setup-node's cache as a
  # cache-poisoning risk (zizmor). The dispatch lives in release.yml, which
  # already disables caching.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare documentation files
        # Reads the public Releases API anonymously — no token required.
        run: ./scripts/prepare-docs.sh

      - name: Build documentation
        run: npm run docs:build

      - name: Upload artifact
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
