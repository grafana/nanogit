name: Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs.yml'
      - '*.md'
      - 'scripts/prepare-docs.sh'
  pull_request:
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs.yml'
      - '*.md'
      - 'scripts/prepare-docs.sh'
  # Rebuild when a release is published so the changelog page (generated from
  # GitHub Releases) reflects the new release.
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          # Caching is intentionally disabled: this workflow now runs on
          # `release: published` and publishes the Pages artifact, so a poisoned
          # dependency cache could taint the published site (zizmor
          # cache-poisoning). Matches the no-cache policy in release.yml.

      - name: Install dependencies
        run: npm ci

      - name: Prepare documentation files
        # Reads the public Releases API anonymously — no token required.
        run: ./scripts/prepare-docs.sh

      - name: Build documentation
        run: npm run docs:build

      - name: Upload artifact
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'release'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
