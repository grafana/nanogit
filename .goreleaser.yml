# GoReleaser configuration for nanogit CLI
# See: https://goreleaser.com

version: 2

project_name: nanogit

before:
  hooks:
    # Ensure dependencies are up to date
    - go mod download
    - go work vendor

builds:
  - id: nanogit-cli
    main: ./cli/cmd/nanogit
    binary: nanogit

    env:
      - CGO_ENABLED=0

    goos:
      - linux
      - darwin
      - windows

    goarch:
      - amd64
      - arm64
      - arm

    goarm:
      - "7"

    # Skip specific combinations
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64

    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}

archives:
  - id: nanogit-cli
    builds:
      - nanogit-cli

    format: tar.gz

    # Use zip for Windows
    format_overrides:
      - goos: windows
        format: zip

    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

    files:
      - LICENSE*
      - README*
      - cli/README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  # Disable GoReleaser changelog - semantic-release handles release notes
  disable: true

release:
  github:
    owner: grafana
    name: nanogit

  # Don't create a new release, just upload assets to existing release
  mode: append

  # Don't modify the release notes (semantic-release handles that)
  skip_upload: false

  footer: |
    ## Installation

    ### Using Go Install
    ```bash
    go install github.com/grafana/nanogit/cli/cmd/nanogit@{{ .Tag }}
    ```

    ### Download Binary
    Download the appropriate binary for your platform from the assets above.

    **Full Changelog**: https://github.com/grafana/nanogit/compare/{{ .PreviousTag }}...{{ .Tag }}
